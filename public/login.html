<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 医院呼叫系统</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 登录页面专用样式 */
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 30%, #7dd3fc 60%, #38bdf8 100%);
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 背景装饰圆 */
        .login-page::before {
            content: '';
            position: absolute;
            top: -120px;
            right: -120px;
            width: 360px;
            height: 360px;
            border-radius: 50%;
            background: rgba(3, 105, 161, 0.08);
        }

        .login-page::after {
            content: '';
            position: absolute;
            bottom: -80px;
            left: -80px;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            background: rgba(3, 105, 161, 0.06);
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: var(--white);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(3, 105, 161, 0.15), 0 4px 16px rgba(0, 0, 0, 0.06);
            padding: 48px 40px;
            position: relative;
            z-index: 1;
        }

        /* 医院十字图标 */
        .login-logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 24px rgba(3, 105, 161, 0.3);
        }

        .login-logo .cross {
            position: relative;
            width: 32px;
            height: 32px;
        }

        .login-logo .cross::before,
        .login-logo .cross::after {
            content: '';
            position: absolute;
            background-color: var(--white);
            border-radius: 3px;
        }

        .login-logo .cross::before {
            top: 50%;
            left: 0;
            right: 0;
            height: 8px;
            transform: translateY(-50%);
        }

        .login-logo .cross::after {
            left: 50%;
            top: 0;
            bottom: 0;
            width: 8px;
            transform: translateX(-50%);
        }

        .login-title {
            text-align: center;
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 6px;
        }

        .login-subtitle {
            text-align: center;
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 36px;
        }

        .login-form .form-group {
            margin-bottom: 20px;
        }

        .login-form .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 8px;
        }

        .login-form .input-wrapper {
            position: relative;
        }

        .login-form .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .login-form .form-control {
            padding-left: 42px;
            height: 46px;
            font-size: 15px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .login-form .form-control:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(3, 105, 161, 0.1);
        }

        .login-btn {
            width: 100%;
            height: 46px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 8px;
            margin-top: 8px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            color: var(--white);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .login-btn:hover {
            box-shadow: 0 6px 20px rgba(3, 105, 161, 0.35);
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .login-btn .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            display: none;
        }

        .login-btn.loading .spinner {
            display: inline-block;
        }

        .login-btn.loading .btn-text {
            display: none;
        }

        .login-btn.loading .btn-loading-text {
            display: inline;
        }

        .login-btn .btn-loading-text {
            display: none;
        }

        .login-error {
            display: none;
            background-color: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 14px;
            text-align: center;
            animation: shakeX 0.4s ease;
        }

        .login-error.show {
            display: block;
        }

        @keyframes shakeX {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        .login-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
                border-radius: 12px;
            }

            .login-title {
                font-size: 20px;
            }

            .login-logo {
                width: 60px;
                height: 60px;
                border-radius: 14px;
            }

            .login-logo .cross {
                width: 26px;
                height: 26px;
            }

            .login-logo .cross::before {
                height: 6px;
            }

            .login-logo .cross::after {
                width: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <!-- 医院十字图标 -->
            <div class="login-logo">
                <div class="cross"></div>
            </div>

            <h1 class="login-title">医院呼叫系统</h1>
            <p class="login-subtitle">Hospital Calling System</p>

            <!-- 错误提示 -->
            <div class="login-error" id="loginError"></div>

            <!-- 登录表单 -->
            <form class="login-form" id="loginForm" onsubmit="return false;">
                <div class="form-group">
                    <label for="phone">账号</label>
                    <div class="input-wrapper">
                        <span class="input-icon">&#9742;</span>
                        <input
                            type="tel"
                            id="phone"
                            class="form-control"
                            placeholder="请输入手机号"
                            autocomplete="tel"
                            maxlength="11"
                            required
                        >
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon">&#128274;</span>
                        <input
                            type="password"
                            id="password"
                            class="form-control"
                            placeholder="请输入密码"
                            autocomplete="current-password"
                            required
                        >
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn" onclick="handleLogin()">
                    <span class="spinner"></span>
                    <span class="btn-text">登 录</span>
                    <span class="btn-loading-text">登录中...</span>
                </button>
            </form>

            <div class="login-footer">
                &copy; 2026 医院呼叫系统 &middot; 安全登录
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // 如果已登录，直接跳转
        (function() {
            var token = localStorage.getItem('token');
            var userStr = localStorage.getItem('user');
            if (token && userStr) {
                try {
                    var user = JSON.parse(userStr);
                    var rolePageMap = {
                        'admin': 'admin.html',
                        'nurse': 'nurse.html',
                        'doctor': 'doctor.html'
                    };
                    var targetPage = rolePageMap[user.role];
                    if (targetPage) {
                        window.location.href = targetPage;
                        return;
                    }
                } catch (e) {
                    // 解析失败，清除无效数据
                    localStorage.removeItem('token');
                    localStorage.removeItem('user');
                }
            }
        })();

        // 回车键提交
        document.getElementById('loginForm').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.keyCode === 13) {
                e.preventDefault();
                handleLogin();
            }
        });

        /**
         * 处理登录
         */
        function handleLogin() {
            var phone = document.getElementById('phone').value.trim();
            var password = document.getElementById('password').value;
            var loginBtn = document.getElementById('loginBtn');
            var loginError = document.getElementById('loginError');

            // 隐藏之前的错误
            loginError.classList.remove('show');
            loginError.textContent = '';

            // 表单验证
            if (!phone) {
                showError('请输入账号');
                document.getElementById('phone').focus();
                return;
            }

            if (phone.length < 3) {
                showError('请输入正确的账号');
                document.getElementById('phone').focus();
                return;
            }

            if (!password) {
                showError('请输入密码');
                document.getElementById('password').focus();
                return;
            }

            // 设置加载状态
            loginBtn.classList.add('loading');
            loginBtn.disabled = true;

            // 发送登录请求
            api.post('/auth/login', {
                phone: phone,
                password: password
            }).then(function(result) {
                var data = result.data || result;
                var token = data.token;

                if (!token || !data.id) {
                    showError('登录返回数据异常');
                    return;
                }

                // 存储登录信息
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(data));

                // 根据角色跳转到对应页面
                var rolePageMap = {
                    'admin': 'admin.html',
                    'nurse': 'nurse.html',
                    'doctor': 'doctor.html'
                };

                var targetPage = rolePageMap[data.role];
                if (targetPage) {
                    window.location.href = targetPage;
                } else {
                    showError('未知角色类型，无法跳转');
                }
            }).catch(function(err) {
                showError(err.message || '登录失败，请稍后重试');
            }).finally(function() {
                loginBtn.classList.remove('loading');
                loginBtn.disabled = false;
            });
        }

        /**
         * 显示错误提示
         */
        function showError(message) {
            var loginError = document.getElementById('loginError');
            loginError.textContent = message;
            loginError.classList.add('show');
        }
    </script>
</body>
</html>
