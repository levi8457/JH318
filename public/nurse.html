<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导诊护士后台 - 医院呼叫系统</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 导诊护士页面专用样式 */

        /* Tab 切换 */
        .tab-nav {
            display: flex;
            gap: 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 24px;
        }

        .tab-btn {
            padding: 12px 28px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-muted);
            background: none;
            border: none;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            font-weight: 600;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* 表单布局 */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0 20px;
        }

        .form-grid .form-group.full-width {
            grid-column: 1 / -1;
        }

        /* 筛选栏 */
        .filter-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-bar label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
        }

        .filter-bar .form-control {
            width: auto;
            min-width: 180px;
        }

        /* 患者录入表单卡片 */
        .patient-form-card {
            max-width: 800px;
        }

        /* 提交按钮区域 */
        .form-actions {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 12px;
        }

        .form-actions .btn {
            min-width: 140px;
            font-size: 15px;
            padding: 12px 24px;
        }

        /* 编辑模态框样式 */
        .edit-modal .modal {
            max-width: 600px;
        }

        .edit-modal .form-grid {
            grid-template-columns: 1fr;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .tab-btn {
                padding: 10px 16px;
                font-size: 14px;
            }

            .filter-bar .form-control {
                min-width: 140px;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="navbar">
        <a class="navbar-brand" href="nurse.html">
            <div class="logo-icon">+</div>
            <span>医院呼叫系统</span>
        </a>
        <div class="navbar-nav">
            <div class="navbar-user">
                <span class="user-name" id="navUserName">--</span>
                <span class="badge badge-blue">导诊护士</span>
                <button class="btn btn-sm btn-danger" onclick="handleLogout()">退出</button>
            </div>
        </div>
    </nav>

    <!-- 页面主体 -->
    <div class="page-body">
        <div class="container">
            <!-- Tab 导航 -->
            <div class="tab-nav">
                <button class="tab-btn active" data-tab="entry" onclick="switchTab('entry')">患者录入</button>
                <button class="tab-btn" data-tab="list" onclick="switchTab('list')">今日患者</button>
            </div>

            <!-- Tab 1: 患者录入 -->
            <div class="tab-content active" id="tabEntry">
                <div class="card patient-form-card">
                    <div class="card-header">患者信息录入</div>
                    <form id="patientForm" onsubmit="return false;">
                        <div class="form-grid">
                            <div class="form-group">
                                <label>姓名 <span class="required">*</span></label>
                                <input type="text" class="form-control" id="formName" placeholder="请输入患者姓名" required>
                            </div>
                            <div class="form-group">
                                <label>年龄</label>
                                <input type="number" class="form-control" id="formAge" placeholder="请输入年龄（选填）" min="0" max="150">
                            </div>
                            <div class="form-group">
                                <label>病症名称</label>
                                <input type="text" class="form-control" id="formDisease" placeholder="请输入病症名称（选填）">
                            </div>
                            <div class="form-group">
                                <label>是否预约</label>
                                <select class="form-control" id="formAppointment">
                                    <option value="no">否</option>
                                    <option value="yes">是</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>客户来源</label>
                                <select class="form-control" id="formSource">
                                    <option value="">请选择（选填）</option>
                                    <option value="online">线上预约</option>
                                    <option value="onsite">现场挂号</option>
                                    <option value="referral">转介绍</option>
                                    <option value="ad">广告推广</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>挂号医生 <span class="required">*</span></label>
                                <select class="form-control" id="formDoctor" required>
                                    <option value="">请选择医生</option>
                                </select>
                            </div>
                            <div class="form-group full-width">
                                <label>来院就诊记录</label>
                                <textarea class="form-control" id="formMedicalHistory" placeholder="请输入来院就诊记录（选填）" rows="3"></textarea>
                            </div>
                            <div class="form-group full-width">
                                <label>病症症状</label>
                                <textarea class="form-control" id="formSymptoms" placeholder="请详细描述病症症状（选填）" rows="3"></textarea>
                            </div>
                            <div class="form-group full-width">
                                <label>补充备注</label>
                                <textarea class="form-control" id="formNotes" placeholder="请输入补充备注（选填）" rows="3"></textarea>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn btn-primary" id="submitBtn" onclick="submitPatient()">提交并发号</button>
                            <button type="button" class="btn" style="background-color: var(--bg); color: var(--text-muted);" onclick="resetForm()">重置</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Tab 2: 今日患者列表 -->
            <div class="tab-content" id="tabList">
                <div class="card">
                    <div class="card-header">今日患者列表</div>
                    <!-- 筛选栏 -->
                    <div class="filter-bar">
                        <label>按挂号医生筛选：</label>
                        <select class="form-control" id="filterDoctor" onchange="loadPatientList()">
                            <option value="">全部医生</option>
                        </select>
                    </div>
                    <!-- 表格 -->
                    <div class="table-wrapper">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>号码牌</th>
                                    <th>患者姓名</th>
                                    <th>年龄</th>
                                    <th>病症</th>
                                    <th>挂号医生</th>
                                    <th>录入时间</th>
                                    <th class="text-center">操作</th>
                                </tr>
                            </thead>
                            <tbody id="patientTableBody">
                                <tr>
                                    <td colspan="7" class="text-center text-muted" style="padding: 40px;">暂无数据</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑患者模态框 -->
    <div class="modal-overlay edit-modal" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <h3>编辑患者信息</h3>
                <button class="modal-close" onclick="closeEditModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="editForm" onsubmit="return false;">
                    <input type="hidden" id="editId">
                    <div class="form-grid">
                        <div class="form-group">
                            <label>姓名 <span class="required">*</span></label>
                            <input type="text" class="form-control" id="editName" required>
                        </div>
                        <div class="form-group">
                            <label>年龄</label>
                            <input type="number" class="form-control" id="editAge" min="0" max="150">
                        </div>
                        <div class="form-group">
                            <label>病症名称</label>
                            <input type="text" class="form-control" id="editDisease">
                        </div>
                        <div class="form-group">
                            <label>是否预约</label>
                            <select class="form-control" id="editAppointment">
                                <option value="no">否</option>
                                <option value="yes">是</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>客户来源</label>
                            <select class="form-control" id="editSource">
                                <option value="">请选择（选填）</option>
                                <option value="online">线上预约</option>
                                <option value="onsite">现场挂号</option>
                                <option value="referral">转介绍</option>
                                <option value="ad">广告推广</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>挂号医生 <span class="required">*</span></label>
                            <select class="form-control" id="editDoctor" required>
                                <option value="">请选择医生</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>来院就诊记录</label>
                            <textarea class="form-control" id="editMedicalHistory" rows="2"></textarea>
                        </div>
                        <div class="form-group">
                            <label>病症症状</label>
                            <textarea class="form-control" id="editSymptoms" rows="2"></textarea>
                        </div>
                        <div class="form-group">
                            <label>补充备注</label>
                            <textarea class="form-control" id="editNotes" rows="2"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" style="background-color: var(--bg); color: var(--text-muted);" onclick="closeEditModal()">取消</button>
                <button class="btn btn-primary" id="editSaveBtn" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/utils.js"></script>
    <script>
        // ========================================
        // 页面初始化
        // ========================================
        (function init() {
            // 检查登录状态
            var token = localStorage.getItem('token');
            var userStr = localStorage.getItem('user');
            if (!token || !userStr) {
                window.location.href = 'login.html';
                return;
            }

            // 检查角色
            var user;
            try {
                user = JSON.parse(userStr);
            } catch (e) {
                localStorage.removeItem('token');
                localStorage.removeItem('user');
                window.location.href = 'login.html';
                return;
            }

            if (user.role !== 'nurse') {
                var rolePageMap = {
                    'admin': 'admin.html',
                    'doctor': 'doctor.html'
                };
                var targetPage = rolePageMap[user.role];
                if (targetPage) {
                    window.location.href = targetPage;
                } else {
                    window.location.href = 'login.html';
                }
                return;
            }

            // 显示用户名
            document.getElementById('navUserName').textContent = user.name || user.phone || '--';

            // 加载医生列表和患者列表
            loadDoctorList();
            loadPatientList();
        })();

        // ========================================
        // Tab 切换
        // ========================================
        function switchTab(tabName) {
            // 切换按钮状态
            var btns = document.querySelectorAll('.tab-btn');
            btns.forEach(function(btn) {
                btn.classList.remove('active');
                if (btn.getAttribute('data-tab') === tabName) {
                    btn.classList.add('active');
                }
            });

            // 切换内容区域
            document.getElementById('tabEntry').classList.remove('active');
            document.getElementById('tabList').classList.remove('active');

            if (tabName === 'entry') {
                document.getElementById('tabEntry').classList.add('active');
            } else if (tabName === 'list') {
                document.getElementById('tabList').classList.add('active');
                loadPatientList();
            }
        }

        // ========================================
        // 加载在岗医生列表
        // ========================================
        function loadDoctorList() {
            api.get('/nurse/doctors').then(function(result) {
                var doctors = result.data || result || [];
                var formDoctorSelect = document.getElementById('formDoctor');
                var editDoctorSelect = document.getElementById('editDoctor');
                var filterDoctorSelect = document.getElementById('filterDoctor');

                // 清空选项（保留第一个默认选项）
                formDoctorSelect.innerHTML = '<option value="">请选择医生</option>';
                editDoctorSelect.innerHTML = '<option value="">请选择医生</option>';
                filterDoctorSelect.innerHTML = '<option value="">全部医生</option>';

                doctors.forEach(function(doc) {
                    var name = doc.name || '未知医生';
                    var id = doc.id || doc.doctor_id || doc.userId;

                    var opt1 = document.createElement('option');
                    opt1.value = id;
                    opt1.textContent = name;
                    formDoctorSelect.appendChild(opt1);

                    var opt2 = document.createElement('option');
                    opt2.value = id;
                    opt2.textContent = name;
                    editDoctorSelect.appendChild(opt2);

                    var opt3 = document.createElement('option');
                    opt3.value = id;
                    opt3.textContent = name;
                    filterDoctorSelect.appendChild(opt3);
                });
            }).catch(function(err) {
                showNotification('加载医生列表失败：' + err.message, 'error');
            });
        }

        // ========================================
        // 加载今日患者列表
        // ========================================
        function loadPatientList() {
            var filterDoctor = document.getElementById('filterDoctor').value;
            var url = '/nurse/patients';
            if (filterDoctor) {
                url += '?doctor_id=' + encodeURIComponent(filterDoctor);
            }

            api.get(url).then(function(result) {
                var patients = result.data || result || [];
                var tbody = document.getElementById('patientTableBody');

                if (patients.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted" style="padding: 40px;">暂无患者数据</td></tr>';
                    return;
                }

                var html = '';
                patients.forEach(function(p) {
                    var ticketNo = p.ticket_number || '--';
                    var name = maskName(p.name || '');
                    var age = p.age || '--';
                    var disease = p.symptom_name || '--';
                    var doctorName = p.doctor_name || '--';
                    var createdAt = formatDateTime(p.created_at || '');

                    html += '<tr>' +
                        '<td><span class="badge badge-blue">' + ticketNo + '</span></td>' +
                        '<td>' + name + '</td>' +
                        '<td>' + age + '</td>' +
                        '<td>' + disease + '</td>' +
                        '<td>' + doctorName + '</td>' +
                        '<td>' + createdAt + '</td>' +
                        '<td class="text-center">' +
                            '<button class="btn btn-sm btn-primary" onclick="openEditModal(' + JSON.stringify(p).replace(/"/g, '&quot;') + ')">编辑</button>' +
                        '</td>' +
                    '</tr>';
                });

                tbody.innerHTML = html;
            }).catch(function(err) {
                showNotification('加载患者列表失败：' + err.message, 'error');
            });
        }

        // ========================================
        // 提交患者录入
        // ========================================
        function submitPatient() {
            var name = document.getElementById('formName').value.trim();
            var age = document.getElementById('formAge').value;
            var disease = document.getElementById('formDisease').value.trim();
            var appointment = document.getElementById('formAppointment').value;
            var source = document.getElementById('formSource').value;
            var doctor = document.getElementById('formDoctor').value;
            var medicalHistory = document.getElementById('formMedicalHistory').value.trim();
            var symptoms = document.getElementById('formSymptoms').value.trim();
            var notes = document.getElementById('formNotes').value.trim();

            // 表单验证（仅姓名和医生为必填）
            if (!name) { showNotification('请输入患者姓名', 'warning'); return; }
            if (!doctor) { showNotification('请选择挂号医生', 'warning'); return; }

            var submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '提交中...';

            var data = {
                name: name,
                age: parseInt(age),
                symptom_name: disease,
                is_reserved: appointment === 'yes' ? 1 : 0,
                source: source,
                doctor_id: parseInt(doctor),
                visit_history: medicalHistory,
                symptoms: symptoms,
                remarks: notes
            };

            api.post('/nurse/patients', data).then(function(result) {
                var resData = result.data || result;
                var ticketNo = resData.ticket_number || '';
                showNotification('患者录入成功，号码牌：' + ticketNo, 'success');
                resetForm();
            }).catch(function(err) {
                showNotification('录入失败：' + err.message, 'error');
            }).finally(function() {
                submitBtn.disabled = false;
                submitBtn.textContent = '提交并发号';
            });
        }

        // ========================================
        // 重置表单
        // ========================================
        function resetForm() {
            document.getElementById('patientForm').reset();
        }

        // ========================================
        // 编辑模态框
        // ========================================
        function openEditModal(patient) {
            document.getElementById('editId').value = patient.id || '';
            document.getElementById('editName').value = patient.name || '';
            document.getElementById('editAge').value = patient.age || '';
            document.getElementById('editDisease').value = patient.symptom_name || '';
            document.getElementById('editAppointment').value = patient.is_reserved === 1 || patient.is_reserved === '1' ? 'yes' : 'no';
            document.getElementById('editSource').value = patient.source || '';
            document.getElementById('editDoctor').value = patient.doctor_id || '';
            document.getElementById('editMedicalHistory').value = patient.visit_history || '';
            document.getElementById('editSymptoms').value = patient.symptoms || '';
            document.getElementById('editNotes').value = patient.remarks || '';

            document.getElementById('editModal').classList.add('active');
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.remove('active');
        }

        function saveEdit() {
            var id = document.getElementById('editId').value;
            var name = document.getElementById('editName').value.trim();
            var age = document.getElementById('editAge').value;
            var disease = document.getElementById('editDisease').value.trim();
            var appointment = document.getElementById('editAppointment').value;
            var source = document.getElementById('editSource').value;
            var doctor = document.getElementById('editDoctor').value;
            var medicalHistory = document.getElementById('editMedicalHistory').value.trim();
            var symptoms = document.getElementById('editSymptoms').value.trim();
            var notes = document.getElementById('editNotes').value.trim();

            // 表单验证（仅姓名和医生为必填）
            if (!name) { showNotification('请输入患者姓名', 'warning'); return; }
            if (!doctor) { showNotification('请选择挂号医生', 'warning'); return; }

            var saveBtn = document.getElementById('editSaveBtn');
            saveBtn.disabled = true;
            saveBtn.textContent = '保存中...';

            var data = {
                name: name,
                age: parseInt(age),
                symptom_name: disease,
                is_reserved: appointment === 'yes' ? 1 : 0,
                source: source,
                doctor_id: parseInt(doctor),
                visit_history: medicalHistory,
                symptoms: symptoms,
                remarks: notes
            };

            api.put('/nurse/patients/' + id, data).then(function() {
                showNotification('患者信息更新成功', 'success');
                closeEditModal();
                loadPatientList();
            }).catch(function(err) {
                showNotification('更新失败：' + err.message, 'error');
            }).finally(function() {
                saveBtn.disabled = false;
                saveBtn.textContent = '保存';
            });
        }

        // 点击模态框遮罩关闭
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeEditModal();
            }
        });

        // ========================================
        // 退出登录
        // ========================================
        function handleLogout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
